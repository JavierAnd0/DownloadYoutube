services:
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      - BGUTIL_HTTP_ENDPOINT=http://bgutil:4416
      - YTDLP_COOKIES=/app/cookies.txt
    volumes:
      - /etc/grabr-cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
    depends_on:
      - bgutil
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
